<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="ch-bg" x1="0" y1="0" x2="320" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8F6F4"/>
      <stop offset="50%" stop-color="#FFF7F2"/>
      <stop offset="100%" stop-color="#EEF6FC"/>
    </linearGradient>
    <radialGradient id="ch-blob1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(40 140) rotate(90) scale(40)">
      <stop stop-color="#2A9D8F" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#2A9D8F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ch-blob2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(290 30) rotate(90) scale(45)">
      <stop stop-color="#4A90D9" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4A90D9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ch-hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2A9D8F"/>
      <stop offset="50%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#E85D24"/>
    </linearGradient>
    <filter id="ch-shadow" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1B2A3D" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="320" height="160" fill="url(#ch-bg)"/>
  <circle cx="40" cy="140" r="40" fill="url(#ch-blob1)"/>
  <circle cx="290" cy="30" r="45" fill="url(#ch-blob2)"/>
  <!-- Old site (faded) -->
  <g opacity="0.55">
    <rect x="24" y="48" width="72" height="80" rx="4" fill="#fff" stroke="#D1D5DB" stroke-width="1"/>
    <rect x="32" y="58" width="56" height="20" rx="2" fill="#F3F4F6"/>
    <rect x="32" y="86" width="40" height="3" rx="1" fill="#E5E7EB"/>
    <rect x="32" y="96" width="48" height="3" rx="1" fill="#E5E7EB"/>
    <rect x="32" y="106" width="32" height="3" rx="1" fill="#E5E7EB"/>
  </g>
  <!-- Arrow -->
  <path d="M108 88 H128" stroke="#2A9D8F" stroke-width="2" stroke-linecap="round"/>
  <path d="M122 82 L130 88 L122 94" stroke="#2A9D8F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- New browser -->
  <g filter="url(#ch-shadow)">
    <rect x="136" y="16" width="168" height="128" rx="8" fill="#fff" stroke="#E6E6E6" stroke-width="1"/>
    <rect x="136" y="16" width="168" height="22" rx="8" fill="#FAFAFA"/>
    <rect x="136" y="30" width="168" height="8" fill="#FAFAFA"/>
    <circle cx="152" cy="27" r="3.5" fill="#E85D24" fill-opacity="0.5"/>
    <circle cx="164" cy="27" r="3.5" fill="#F4A261" fill-opacity="0.5"/>
    <circle cx="176" cy="27" r="3.5" fill="#2A9D8F" fill-opacity="0.5"/>
    <!-- Hero band -->
    <rect x="144" y="44" width="152" height="36" rx="4" fill="url(#ch-hero)" fill-opacity="0.85"/>
    <rect x="156" y="54" width="72" height="6" rx="2" fill="#fff" fill-opacity="0.85"/>
    <rect x="156" y="66" width="48" height="4" rx="1" fill="#fff" fill-opacity="0.5"/>
    <!-- Content blocks -->
    <rect x="144" y="88" width="44" height="28" rx="3" fill="#2A9D8F" fill-opacity="0.08" stroke="#2A9D8F" stroke-width="0.8"/>
    <rect x="196" y="88" width="44" height="28" rx="3" fill="#4A90D9" fill-opacity="0.08" stroke="#4A90D9" stroke-width="0.8"/>
    <rect x="248" y="88" width="44" height="28" rx="3" fill="#E85D24" fill-opacity="0.08" stroke="#E85D24" stroke-width="0.8"/>
    <rect x="152" y="96" width="24" height="3" rx="1" fill="#2A9D8F" fill-opacity="0.3"/>
    <rect x="204" y="96" width="24" height="3" rx="1" fill="#4A90D9" fill-opacity="0.3"/>
    <rect x="256" y="96" width="24" height="3" rx="1" fill="#E85D24" fill-opacity="0.3"/>
    <rect x="144" y="124" width="152" height="12" rx="2" fill="#E85D24" fill-opacity="0.12"/>
  </g>
  <!-- Refresh badge -->
  <circle cx="296" cy="28" r="18" fill="#fff" stroke="#2A9D8F" stroke-width="2"/>
  <path d="M296 18 A10 10 0 1 1 286 28" stroke="#2A9D8F" stroke-width="2" stroke-linecap="round"/>
  <path d="M286 22 L286 18 L290 18" stroke="#2A9D8F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

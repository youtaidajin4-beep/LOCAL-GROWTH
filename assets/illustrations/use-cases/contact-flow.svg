<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="cf-bg" x1="0" y1="0" x2="320" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EEF6FC"/>
      <stop offset="50%" stop-color="#FFF7F2"/>
      <stop offset="100%" stop-color="#E8F6F4"/>
    </linearGradient>
    <radialGradient id="cf-blob" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(160 80) rotate(90) scale(70)">
      <stop stop-color="#4A90D9" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#4A90D9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cf-cta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A9D8F"/>
      <stop offset="100%" stop-color="#4A90D9"/>
    </linearGradient>
    <linearGradient id="cf-path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#E85D24"/>
    </linearGradient>
    <filter id="cf-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2A9D8F" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="320" height="160" fill="url(#cf-bg)"/>
  <circle cx="160" cy="80" r="70" fill="url(#cf-blob)"/>
  <!-- Visitor -->
  <g filter="url(#cf-shadow)">
    <circle cx="44" cy="80" r="22" fill="#fff" stroke="#4A90D9" stroke-width="1.5"/>
    <circle cx="44" cy="72" r="8" fill="#4A90D9" fill-opacity="0.2" stroke="#4A90D9" stroke-width="1.2"/>
    <path d="M30 98 Q44 86 58 98" fill="#4A90D9" fill-opacity="0.1" stroke="#4A90D9" stroke-width="1.2"/>
  </g>
  <!-- Path line -->
  <path d="M72 80 H96" stroke="url(#cf-path)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M90 74 L98 80 L90 86" stroke="#4A90D9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Page preview -->
  <g filter="url(#cf-shadow)">
    <rect x="104" y="44" width="80" height="72" rx="6" fill="#fff" stroke="#E6E6E6" stroke-width="1"/>
    <rect x="112" y="54" width="48" height="5" rx="2" fill="#4A90D9" fill-opacity="0.25"/>
    <rect x="112" y="66" width="64" height="3" rx="1" fill="#F3F4F6"/>
    <rect x="112" y="76" width="56" height="3" rx="1" fill="#F3F4F6"/>
    <rect x="112" y="86" width="40" height="3" rx="1" fill="#F3F4F6"/>
    <rect x="112" y="98" width="32" height="10" rx="2" fill="#E85D24" fill-opacity="0.15" stroke="#E85D24" stroke-width="0.8"/>
  </g>
  <path d="M192 80 H212" stroke="url(#cf-path)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M206 74 L214 80 L206 86" stroke="#E85D24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- CTA destination -->
  <g filter="url(#cf-shadow)">
    <rect x="220" y="36" width="84" height="88" rx="8" fill="#fff" stroke="#2A9D8F" stroke-width="1.5"/>
    <rect x="228" y="48" width="40" height="4" rx="1" fill="#2A9D8F" fill-opacity="0.3"/>
    <rect x="228" y="58" width="56" height="3" rx="1" fill="#F3F4F6"/>
    <rect x="228" y="72" width="68" height="24" rx="5" fill="url(#cf-cta)"/>
    <rect x="240" y="82" width="44" height="4" rx="1" fill="#fff" fill-opacity="0.9"/>
  </g>
  <!-- Conversion arrow -->
  <path d="M262 24 L262 32" stroke="#E85D24" stroke-width="2" stroke-linecap="round"/>
  <path d="M256 28 L262 22 L268 28" stroke="#E85D24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="248" y="16" width="28" height="2" rx="1" fill="#E85D24" fill-opacity="0.4"/>
  <circle cx="262" cy="16" r="4" fill="#E85D24" fill-opacity="0.2" stroke="#E85D24" stroke-width="1"/>
</svg>

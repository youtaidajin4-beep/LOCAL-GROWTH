<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="dr-bg" x1="0" y1="0" x2="320" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFEDE4"/>
      <stop offset="100%" stop-color="#FFF7F2"/>
    </linearGradient>
    <radialGradient id="dr-blob" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(270 40) rotate(90) scale(45)">

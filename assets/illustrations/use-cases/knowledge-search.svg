<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="ks-bg" x1="0" y1="0" x2="320" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFEDE4"/>
      <stop offset="60%" stop-color="#FFF7F2"/>
      <stop offset="100%" stop-color="#EEF6FC"/>
    </linearGradient>
    <radialGradient id="ks-blob" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 120) rotate(90) scale(50)">
      <stop stop-color="#4A90D9" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#4A90D9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ks-search" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#6BA8E8"/>
    </linearGradient>
    <filter id="ks-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#4A90D9" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="320" height="160" fill="url(#ks-bg)"/>
  <circle cx="250" cy="120" r="50" fill="url(#ks-blob)"/>
  <circle cx="30" cy="50" r="30" fill="#E85D24" fill-opacity="0.08"/>
  <!-- Document stack -->
  <rect x="24" y="56" width="52" height="68" rx="3" fill="#fff" stroke="#E5E7EB" stroke-width="1" opacity="0.6" transform="rotate(-4 50 90)"/>
  <rect x="32" y="48" width="52" height="68" rx="3" fill="#fff" stroke="#D1D5DB" stroke-width="1" opacity="0.8" transform="rotate(-2 58 82)"/>
  <g filter="url(#ks-shadow)">
    <rect x="40" y="40" width="52" height="68" rx="3" fill="#fff" stroke="#E85D24" stroke-width="1.2"/>
    <rect x="50" y="54" width="32" height="4" rx="1" fill="#E85D24" fill-opacity="0.15"/>
    <rect x="50" y="64" width="28" height="3" rx="1" fill="#F3F4F6"/>
    <rect x="50" y="74" width="32" height="3" rx="1" fill="#F3F4F6"/>
  </g>
  <!-- Folder -->
  <g filter="url(#ks-shadow)">
    <path d="M108 56 H132 L140 64 H176 V104 H108 Z" fill="#FFF7F2" stroke="#E85D24" stroke-width="1.2" stroke-linejoin="round"/>
    <rect x="116" y="76" width="48" height="3" rx="1" fill="#E85D24" fill-opacity="0.12"/>
    <rect x="116" y="86" width="36" height="3" rx="1" fill="#F3F4F6"/>
  </g>
  <!-- Arrow -->
  <path d="M188 80 H208" stroke="#4A90D9" stroke-width="2" stroke-linecap="round"/>
  <path d="M202 74 L210 80 L202 86" stroke="#4A90D9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Search result panel -->
  <g filter="url(#ks-shadow)">
    <rect x="220" y="20" width="88" height="120" rx="8" fill="#fff" stroke="#F0E4DC" stroke-width="1"/>
    <rect x="228" y="30" width="72" height="20" rx="10" fill="url(#ks-search)" fill-opacity="0.12" stroke="url(#ks-search)" stroke-width="1.2"/>
    <circle cx="240" cy="40" r="6" stroke="#4A90D9" stroke-width="1.5" fill="#4A90D9" fill-opacity="0.1"/>
    <path d="M244 44 L250 50" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="252" y="36" width="40" height="4" rx="1" fill="#4A90D9" fill-opacity="0.3"/>
    <rect x="228" y="60" width="72" height="24" rx="4" fill="#4A90D9" fill-opacity="0.08" stroke="#4A90D9" stroke-width="1"/>
    <rect x="236" y="68" width="48" height="3" rx="1" fill="#4A90D9" fill-opacity="0.35"/>
    <rect x="236" y="76" width="36" height="3" rx="1" fill="#4A90D9" fill-opacity="0.2"/>
    <rect x="228" y="92" width="72" height="20" rx="4" fill="#E85D24" fill-opacity="0.06" stroke="#E85D24" stroke-width="0.8"/>
    <rect x="236" y="100" width="40" height="3" rx="1" fill="#E85D24" fill-opacity="0.2"/>
    <circle cx="288" cy="36" r="8" fill="#3AAF7A" fill-opacity="0.2" stroke="#3AAF7A" stroke-width="1"/>
    <path d="M285 36 L287 38 L291 34" stroke="#3AAF7A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

    <rect x="148" y="24" width="156" height="28" rx="8" fill="url(#ms-header)"/>
    <rect x="148" y="44" width="156" height="8" fill="url(#ms-header)"/>
    <circle cx="164" cy="38" r="5" fill="#fff" fill-opacity="0.9"/>
    <rect x="174" y="35" width="48" height="5" rx="2" fill="#fff" fill-opacity="0.7"/>
    <circle cx="168" cy="68" r="7" fill="#3AAF7A" fill-opacity="0.15" stroke="#3AAF7A" stroke-width="1.2"/>
    <path d="M165 68 L167 70 L171 66" stroke="#3AAF7A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="182" y="64" width="100" height="4" rx="1" fill="#E85D24" fill-opacity="0.25"/>

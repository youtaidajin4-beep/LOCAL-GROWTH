<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="ms-bg" x1="0" y1="0" x2="320" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFEDE4"/>
      <stop offset="100%" stop-color="#FFF7F2"/>
    </linearGradient>
    <radialGradient id="ms-blob1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 30) rotate(90) scale(50)">
      <stop stop-color="#FF8C42" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#FF8C42" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ms-blob2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(40 130) rotate(90) scale(40)">
      <stop stop-color="#E85D24" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#E85D24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ms-header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E85D24"/>
      <stop offset="100%" stop-color="#FF7A45"/>
    </linearGradient>
    <filter id="ms-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#E85D24" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="320" height="160" fill="url(#ms-bg)"/>
  <circle cx="280" cy="30" r="50" fill="url(#ms-blob1)"/>
  <circle cx="40" cy="130" r="40" fill="url(#ms-blob2)"/>

    <path d="M165 108 L167 110 L171 106" stroke="#3AAF7A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="182" y="104" width="90" height="4" rx="1" fill="#E85D24" fill-opacity="0.12"/>
